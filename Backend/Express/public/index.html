
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth website</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.6.7/axios.min.js"></script>
    <script>
        async function signup(){
            const username = document.getElementById("signup-username").value;
            const password = document.getElementById("signup-password").value;

            // fetch / axios
            await axios.post("http://localhost:3000/signup", {
                username: username,
                password: password
            })
            alert("You are signed in");
        }

        async function signin(){
            const username = document.getElementById("signin-username").value;
            const password = document.getElementById("signin-password").value;

            // fetch / axios
            const response = await axios.post("http://localhost:3000/signin", {
                username: username,
                password: password
            });

            // response = {data: {}, statusCode: 200, headers: ......}

            localStorage.setItem("token", response.data.token);

            alert("You are signed in");
        }

        async function getUserInformation(){
            const response = await axios.get("http://localhost:3000/me", {
                headers: {
                    token: localStorage.getItem("token")
                }
            })
            document.getElementById("information").innerHTML = "Username: " + response.data.username + " Password: " + response.data.password;
        }
        getUserInformation();

        function Logout(){
            localStorage.removeItem("token");
        }
    </script>
</head>
<body>
    <div>
        Sign up
        <input id="signup-username" type="text" placeholder="Username" name="username">
        <input id="signup-password" type="password" placeholder="Password" name="password">
        <button onclick="signup()" >Submit</button>
    </div>

    <div>
        Sign in
        <input id="signin-username" type="text" placeholder="Username" name="username">
        <input id="signin-password" type="password" placeholder="Password" name="password">
        <button onclick="signin()" >Submit</button>
    </div>

    <div>
        User Information:
        <div id="information"></div>
    </div>
    <div>
        <button onclick="logout()">Logout</button>
    </div>
</body>
</html>
